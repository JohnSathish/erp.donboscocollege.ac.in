<section class="change-password">
  <div class="change-password__card">
    <h2 class="change-password__title">Update Your Password</h2>
    <p class="change-password__subtitle">
      For security reasons, please choose a new password before accessing your dashboard.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="change-password__field">
        <span>Current Password</span>
        <input type="password" formControlName="currentPassword" />
        <span class="change-password__error" *ngIf="controlInvalid('currentPassword')">
          Enter your current password (minimum 5 characters).
        </span>
      </label>

      <label class="change-password__field">
        <span>New Password</span>
        <input type="password" formControlName="newPassword" />
        <span class="change-password__error" *ngIf="controlInvalid('newPassword')">
          New password must be at least 8 characters.
        </span>
      </label>

      <label class="change-password__field">
        <span>Confirm New Password</span>
        <input type="password" formControlName="confirmPassword" />
        <span class="change-password__error" *ngIf="passwordsMismatch">
          Passwords do not match.
        </span>
      </label>

      <div class="change-password__actions">
        <button type="button" class="change-password__secondary" (click)="cancel()">
          Cancel
        </button>
        <button type="submit" [disabled]="isSubmitting">
          <span *ngIf="!isSubmitting">Save Password</span>
          <span *ngIf="isSubmitting" class="change-password__spinner" aria-live="polite">
            Saving…
          </span>
        </button>
      </div>
    </form>
  </div>
</section>
